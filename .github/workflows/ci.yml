name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore MemoryBus.sln

      - name: Build
        run: dotnet build MemoryBus.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test MemoryBus.sln --configuration Release --no-build --verbosity normal
